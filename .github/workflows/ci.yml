name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + tests (100% tracker coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check pokedex/ tracker/ main.py tests/

      - name: Pytest + coverage (100% on tracker/)
        run: uv run pytest tests/ --cov=tracker --cov-report=term-missing --cov-report=xml --cov-fail-under=100

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker image builds cleanly
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image (no push)
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: pokevault:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
