services:
  tracker:
    image: ${DOCKER_IMAGE:-ghcr.io/boblebol/pokevault}:${DOCKER_TAG:-latest}
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data:/app/data
    environment:
      - TRACKER_HOST=0.0.0.0
      - TRACKER_PORT=8765
      - TRACKER_REFERENCE_DATA_DIR=/app/reference-data
    restart: unless-stopped
